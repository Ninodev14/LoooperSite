<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Exemple Accessibilité</title>
    <link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Titan+One&display=swap"
        rel="stylesheet">
        <link rel="stylesheet" href="src/css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: all 0.3s ease;
        }


        .high-contrast {
            background-color: #000;
            color: #fff !important;
        }

        .opendyslexic {
            font-family: "Open-dyslexic" !important;
        }


        /* Bouton */
        #accessibility-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Menu d’options */
        #accessibility-menu {
            display: none;
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }

        #accessibility-menu button {
            display: block;
            margin: 5px 0;
            width: 100%;
        }
    </style>
</head>

<body>

    <h1>Bienvenue sur mon site</h1>
    <p>Voici un exemple de système d’accessibilité.</p>

    <!-- Bouton principal -->
    <div id="accessibility-btn">♿</div>

    <!-- Menu accessibilité -->
    <div id="accessibility-menu">
        <button onclick="toggleFont()">Police OpenDyslexic</button>
        <button onclick="toggleContrast()">Contraste élevé</button>
        <button onclick="resetSettings()">Réinitialiser</button>
    </div>

    <script>
        const body = document.body;
        const menu = document.getElementById("accessibility-menu");
        const btn = document.getElementById("accessibility-btn");

        // Ouvrir / fermer menu
        btn.addEventListener("click", () => {
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        });

        // Charger préférences au démarrage
        window.onload = () => {
            if (localStorage.getItem("font") === "opendyslexic") {
                body.classList.add("opendyslexic");
            }
            if (localStorage.getItem("contrast") === "high") {
                body.classList.add("high-contrast");
            }
        }

        function toggleFont() {
            body.classList.toggle("opendyslexic");
            if (body.classList.contains("opendyslexic")) {
                localStorage.setItem("font", "opendyslexic");
            } else {
                localStorage.removeItem("font");
            }
        }

        function toggleContrast() {
            body.classList.toggle("high-contrast");
            if (body.classList.contains("high-contrast")) {
                localStorage.setItem("contrast", "high");
            } else {
                localStorage.removeItem("contrast");
            }
        }

        function resetSettings() {
            body.classList.remove("opendyslexic", "high-contrast");
            localStorage.clear();
        }
    </script>

</body>

</html>
