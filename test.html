<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Exemple Accessibilité</title>
    <link href="https://fonts.cdnfonts.com/css/open-dyslexic" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Titan+One&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>

<body>

    <h1>Bienvenue sur mon site</h1>
    <p>Voici un exemple de système d’accessibilité.</p>
     
<div id="accessibility-btn">♿</div>

<div id="accessibility-menu">
    <button onclick="toggleOpendyslexic()">Police OpenDyslexic</button>
    <button onclick="toggleReading()">Police Lecture</button>
    <button onclick="toggleContrast()">Contraste élevé</button>
    <button onclick="toggleLinkOutline()">Encadrer les liens</button>

    <div style="margin-top:10px;">
        <button onclick="zoomOut()">-</button>
        <span id="zoom-level">100%</span>
        <button onclick="zoomIn()">+</button>
    </div>
    
    <button onclick="resetZoom()">Réinitialiser zoom</button>
    <button onclick="resetSettings()">Réinitialiser tout</button>
</div>



    <script src="src/js/accessibility.js"></script>

</body>

</html>
